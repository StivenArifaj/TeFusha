name: tefusha
description: Platformë shqiptare për fushat sportive

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.0.0

  # HTTP / API
  dio: ^5.3.2

  # Local Storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  page_transition: ^2.1.0
  easy_refresh: ^3.3.4
  modal_bottom_sheet: ^3.0.0
  badges: ^3.1.2
  timeago: ^3.6.1
  lottie: ^3.1.2
  smooth_page_indicator: ^1.1.0
  pinput: ^4.0.0
  flutter_screenutil: ^5.9.0

  # Maps
  google_maps_flutter: ^2.5.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  url_launcher: ^6.2.6

  # Calendar / Date picker
  table_calendar: ^3.0.9

  # JSON serialization
  json_annotation: ^4.8.1

  # Dependency Injection
  get_it: ^7.6.4

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  mockito: ^5.4.2
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/